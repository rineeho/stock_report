<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Research</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────
   Design tokens
   ────────────────────────────────────── */
:root {
  /* Font families */
  --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* Ink scale (dark) */
  --ink-950: #0A0B0D;
  --ink-900: #111317;
  --ink-850: #171A1F;
  --ink-800: #1E222A;
  --ink-700: #2A2F38;
  --ink-600: #3A414C;
  --ink-500: #5A6172;
  --ink-400: #7A8090;
  --ink-300: #9AA0AE;
  --ink-200: #C4C8D2;
  --ink-100: #E3E5EB;
  --ink-50:  #F4F5F8;

  /* Semantic surfaces */
  --bg-app:     var(--ink-950);
  --bg-surface: var(--ink-900);
  --bg-hover:   var(--ink-850);
  --bg-active:  var(--ink-800);

  /* Semantic text */
  --fg-display:   var(--ink-50);
  --fg-primary:   var(--ink-100);
  --fg-body:      var(--ink-200);
  --fg-secondary: var(--ink-400);
  --fg-muted:     var(--ink-500);

  /* Borders */
  --border-default: var(--ink-800);
  --border-strong:  var(--ink-700);

  /* Brand accent (amber) */
  --accent-500: #F5A524;
  --accent-300: #FFCB5C;
  --accent-600: #D48810;
  --accent-700: #9E660B;

  /* Market — Korean convention */
  --up-500:    #F23645;
  --up-alpha:  rgba(242, 54, 69, 0.14);
  --down-500:  #2F63E0;
  --down-alpha: rgba(47, 99, 224, 0.14);

  /* Semantic */
  --success:    #12B76A;
  --success-bg: rgba(18, 183, 106, 0.14);
  --warning:    #F59E0B;
  --warning-bg: rgba(245, 158, 11, 0.14);
  --danger:     #E5484D;
  --danger-bg:  rgba(229, 72, 77, 0.14);

  /* Radii */
  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;

  /* Motion */
  --dur-micro: 120ms;
  --dur-normal: 200ms;
  --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 6px 20px rgba(0,0,0,0.12);

  color-scheme: dark;
}

/* ──────────────────────────────────────
   Reset & base
   ────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  color: var(--fg-primary);
  background: var(--bg-app);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a {
  color: var(--fg-primary);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-micro) var(--ease-out);
}
a:hover { border-bottom-color: currentColor; }
::selection { background: var(--accent-500); color: #1a1a1a; }

/* Scrollbar */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--ink-700); border-radius: 9999px; border: 2px solid var(--bg-app); }
*::-webkit-scrollbar-thumb:hover { background: var(--ink-600); }

/* Focus */
:focus-visible { outline: 2px solid var(--accent-500); outline-offset: 2px; border-radius: var(--r-sm); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ──────────────────────────────────────
   Header (sticky glassmorphism)
   ────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  background: rgba(10, 11, 13, 0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-default);
}
.header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--fg-display);
}
.header h1 .accent { color: var(--accent-500); }
.header a {
  font-size: 13px;
  color: var(--fg-secondary);
  border-bottom: none;
}
.header a:hover { color: var(--fg-primary); }

/* ──────────────────────────────────────
   Container
   ────────────────────────────────────── */
.container { max-width: 1040px; margin: 0 auto; padding: 28px 24px; }
@media (max-width: 640px) { .container { padding: 16px; } }

/* ──────────────────────────────────────
   Stat cards
   ────────────────────────────────────── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  text-align: center;
}
.stat-card .value {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--fg-display);
}
.stat-card .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-top: 4px;
}

/* ──────────────────────────────────────
   Date bar & mode toggle
   ────────────────────────────────────── */
.date-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.date-bar select, .date-bar input {
  padding: 7px 12px;
  border: 1px solid var(--border-default);
  border-radius: var(--r-md);
  font-size: 13px;
  font-family: var(--font-mono);
  background: var(--bg-surface);
  color: var(--fg-primary);
  cursor: pointer;
  transition: border-color var(--dur-micro) var(--ease-out);
}
.date-bar select:hover { border-color: var(--border-strong); }
.mode-toggle {
  display: inline-flex;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--r-md);
  padding: 3px;
  gap: 2px;
}
.mode-toggle button {
  padding: 6px 12px;
  border: none;
  border-radius: 5px;
  background: transparent;
  color: var(--fg-muted);
  font-size: 12px;
  font-family: var(--font-sans);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--dur-micro) var(--ease-out);
}
.mode-toggle button:hover { color: var(--fg-primary); background: var(--bg-hover); }
.mode-toggle button.active { background: var(--ink-100); color: var(--ink-950); font-weight: 600; }

/* ──────────────────────────────────────
   Section headings — eyebrow style
   ────────────────────────────────────── */
h2 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin: 28px 0 10px;
}
h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--fg-primary);
  margin: 16px 0 8px;
}

/* ──────────────────────────────────────
   Chips (pill)
   ────────────────────────────────────── */
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 9999px;
  padding: 5px 14px;
  font-size: 13px;
  color: var(--fg-body);
  cursor: pointer;
  transition: all var(--dur-micro) var(--ease-out);
  user-select: none;
}
.chip:hover { border-color: var(--border-strong); background: var(--bg-hover); color: var(--fg-primary); }
.chip .count {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  font-size: 12px;
  color: var(--accent-500);
}

/* ──────────────────────────────────────
   Report card
   ────────────────────────────────────── */
.report-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--r-lg);
  padding: 16px 20px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color var(--dur-micro) var(--ease-out);
}
.report-card:hover { border-color: var(--border-strong); }
.report-card:hover .title { color: var(--accent-500); }
.report-card .eyebrow {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 6px;
}
.report-card .title {
  font-weight: 600;
  font-size: 15px;
  line-height: 1.4;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  color: var(--fg-display);
  transition: color var(--dur-micro) var(--ease-out);
}
.report-card .meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-secondary);
  margin-bottom: 4px;
}
.report-card .meta span { white-space: nowrap; }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  background: var(--bg-active);
  border-radius: var(--r-sm);
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--fg-body);
  border: 1px solid var(--border-default);
  white-space: nowrap;
}
.tag-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Rating badges */
.rating {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: var(--r-sm);
  border: none;
}
.rating-buy  { background: var(--success-bg); color: var(--success); }
.rating-hold { background: var(--warning-bg); color: var(--warning); }
.rating-sell { background: var(--danger-bg);  color: var(--danger); }

/* One-line summary */
.report-card .one-line {
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg-secondary);
  margin-top: 8px;
}

/* ──────────────────────────────────────
   Filter bar
   ────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-bar select {
  padding: 7px 12px;
  border: 1px solid var(--border-default);
  border-radius: var(--r-md);
  font-size: 13px;
  font-family: var(--font-sans);
  background: var(--bg-surface);
  color: var(--fg-primary);
  cursor: pointer;
  transition: border-color var(--dur-micro) var(--ease-out);
}
.filter-bar select:hover { border-color: var(--border-strong); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border-default);
  border-radius: var(--r-md);
  background: var(--bg-active);
  color: var(--fg-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--dur-micro) var(--ease-out);
}
.btn:hover { background: var(--ink-700); }
.btn-accent {
  background: var(--accent-500);
  color: #1a1a1a;
  border-color: var(--accent-500);
  font-weight: 600;
}
.btn-accent:hover { background: var(--accent-300); }

/* ──────────────────────────────────────
   Detail page
   ────────────────────────────────────── */
.detail-header { margin-bottom: 24px; }
.detail-header .title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--fg-display);
  margin-bottom: 12px;
}
.detail-meta {
  font-size: 13px;
  color: var(--fg-secondary);
  margin-bottom: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.detail-meta span { margin-right: 16px; }
.detail-meta a {
  color: var(--accent-500);
  border-bottom: 1px solid transparent;
}
.detail-meta a:hover { border-bottom-color: var(--accent-500); }

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin: 16px 0;
}
.info-box {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--r-lg);
  padding: 14px 16px;
}
.info-box .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 4px;
}
.info-box .value {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 16px;
  font-weight: 600;
  color: var(--fg-display);
}

/* Summary section */
.summary-section {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--r-lg);
  padding: 20px;
  margin: 16px 0;
}
.summary-section .one-line {
  font-size: 15px;
  font-weight: 600;
  color: var(--fg-primary);
  margin-bottom: 12px;
  line-height: 1.5;
}
.summary-section ul { padding-left: 20px; margin: 8px 0; }
.summary-section li {
  margin-bottom: 6px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--fg-body);
}


/* ──────────────────────────────────────
   Table
   ────────────────────────────────────── */
table.stats {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}
table.stats th {
  text-align: left;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-muted);
  font-weight: 500;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-default);
}
table.stats td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--ink-850);
  color: var(--fg-body);
}
table.stats td:last-child {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
table.stats tr:hover td { background: var(--bg-hover); }

/* ──────────────────────────────────────
   Back link
   ────────────────────────────────────── */
.back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--fg-secondary);
  border-bottom: none;
  transition: color var(--dur-micro) var(--ease-out);
}
.back:hover { color: var(--fg-primary); }

/* ──────────────────────────────────────
   States
   ────────────────────────────────────── */
.loading { text-align: center; padding: 48px; color: var(--fg-muted); font-size: 14px; }
.empty { text-align: center; padding: 48px; color: var(--fg-muted); font-size: 14px; }
.count-label {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  margin-bottom: 12px;
}

/* ──────────────────────────────────────
   Utility
   ────────────────────────────────────── */
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="header">
  <h1><span class="accent">Stock</span> Research</h1>
  <a href="#/">홈</a>
</div>
<div class="container" id="app">
  <div class="loading">로딩 중...</div>
</div>

<script>
const $ = (sel, ctx=document) => ctx.querySelector(sel);
const app = document.getElementById('app');

// --- Data layer: load static JSON and cache ---
const dataCache = {};

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

async function getDates() {
  if (!dataCache._dates) {
    dataCache._dates = (await fetchJSON('./dates.json')).dates;
  }
  return dataCache._dates;
}

async function getDailyResult(dateStr) {
  if (!dataCache[dateStr]) {
    dataCache[dateStr] = await fetchJSON(`./data/${dateStr}.json`);
  }
  return dataCache[dateStr];
}

// Compute summary from full DailyResult
function computeSummary(dr) {
  const brokerageCounts = {};
  const tickerCounts = {};
  const sectorCounts = {};
  const analystCounts = {};
  const stockNames = {};
  if (dr.classifications) {
    for (const [k, v] of Object.entries(dr.classifications.by_brokerage || {})) {
      brokerageCounts[k] = v.length;
    }
    for (const [k, v] of Object.entries(dr.classifications.by_ticker || {})) {
      tickerCounts[k] = v.length;
    }
    for (const [k, v] of Object.entries(dr.classifications.by_sector || {})) {
      sectorCounts[k] = v.length;
    }
    for (const [k, v] of Object.entries(dr.classifications.by_analyst || {})) {
      analystCounts[k] = v.length;
    }
  }
  for (const r of (dr.reports || [])) {
    if (r.ticker && r.stock_name) stockNames[r.ticker] = r.stock_name;
  }
  return {
    target_date: dr.target_date,
    report_count: (dr.reports || []).length,
    brokerage_counts: brokerageCounts,
    ticker_counts: tickerCounts,
    sector_counts: sectorCounts,
    analyst_counts: analystCounts,
    stock_names: stockNames,
  };
}

// Filter reports from full DailyResult
function getFilteredReports(dr, {brokerage, ticker, sector, analyst} = {}) {
  const summaryMap = {};
  for (const s of (dr.summaries || [])) {
    summaryMap[s.canonical_id] = s;
  }

  let allowedIds = null;
  const cls = dr.classifications;
  if (brokerage && cls && cls.by_brokerage[brokerage]) {
    allowedIds = new Set(cls.by_brokerage[brokerage]);
  } else if (ticker && cls && cls.by_ticker[ticker]) {
    allowedIds = new Set(cls.by_ticker[ticker]);
  } else if (sector && cls && cls.by_sector[sector]) {
    allowedIds = new Set(cls.by_sector[sector]);
  } else if (analyst && cls && cls.by_analyst[analyst]) {
    allowedIds = new Set(cls.by_analyst[analyst]);
  }

  const items = [];
  for (const report of (dr.reports || [])) {
    if (allowedIds && !allowedIds.has(report.canonical_id)) continue;
    items.push({ ...report, summary: summaryMap[report.canonical_id] || null });
  }
  return items;
}

// Get single report detail
function getReportDetail(dr, canonicalId) {
  const report = (dr.reports || []).find(r => r.canonical_id === canonicalId);
  if (!report) return null;
  const summary = (dr.summaries || []).find(s => s.canonical_id === canonicalId);
  return { ...report, summary: summary || null };
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtPrice(v) {
  if (v == null) return '-';
  return '₩' + Number(v).toLocaleString('ko-KR');
}

function getSourceName(url) {
  if (!url) return '';
  try {
    const host = new URL(url).hostname.replace('www.', '');
    const map = {
      'finance.naver.com': '네이버 리서치',
      'naver.com': '네이버',
      'consensus.hankyung.com': '한경 컨센서스',
      'hankyung.com': '한국경제',
    };
    return map[host] || host;
  } catch { return ''; }
}

function getRatingClass(rating) {
  if (!rating) return 'rating-hold';
  const r = rating.toUpperCase();
  if (r.includes('BUY') || r.includes('매수') || r === 'STRONG BUY' || r === 'OUTPERFORM') return 'rating-buy';
  if (r.includes('SELL') || r.includes('매도') || r === 'UNDERPERFORM' || r === 'REDUCE') return 'rating-sell';
  return 'rating-hold';
}

function getRatingLabel(rating) {
  if (!rating) return '';
  const r = rating.toUpperCase();
  if (r.includes('BUY') || r.includes('매수') || r === 'STRONG BUY' || r === 'OUTPERFORM') return '매수';
  if (r.includes('SELL') || r.includes('매도') || r === 'UNDERPERFORM' || r === 'REDUCE') return '매도';
  return '중립';
}

// --- Date range helpers ---
function getWeekLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = dt => `${dt.getMonth()+1}/${dt.getDate()}`;
  return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}~${fmt(sun)}`;
}

function getMonthLabel(dateStr) {
  return dateStr.slice(0, 7);
}

function groupDatesByRange(dates, mode) {
  const groups = {};
  for (const d of dates) {
    const key = mode === 'week' ? getWeekLabel(d) : mode === 'month' ? getMonthLabel(d) : d;
    if (!groups[key]) groups[key] = [];
    groups[key].push(d);
  }
  return groups;
}

async function getMultiDayResult(dateStrs) {
  const merged = { reports: [], summaries: [], classifications: { by_brokerage: {}, by_ticker: {}, by_sector: {}, by_analyst: {} } };
  for (const ds of dateStrs) {
    try {
      const dr = await getDailyResult(ds);
      merged.reports.push(...(dr.reports || []));
      merged.summaries.push(...(dr.summaries || []));
      if (dr.classifications) {
        for (const cat of ['by_brokerage', 'by_ticker', 'by_sector', 'by_analyst']) {
          for (const [k, v] of Object.entries(dr.classifications[cat] || {})) {
            if (!merged.classifications[cat][k]) merged.classifications[cat][k] = [];
            merged.classifications[cat][k].push(...v);
          }
        }
      }
    } catch(e) { /* skip missing dates */ }
  }
  return merged;
}

// --- Router ---
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);

function route() {
  const hash = location.hash || '#/';
  if (hash.startsWith('#/detail/')) return renderDetail(hash);
  if (hash.startsWith('#/reports/')) return renderReportList(hash);
  return renderDashboard();
}

// --- Dashboard ---
async function renderDashboard() {
  app.innerHTML = '<div class="loading">로딩 중...</div>';
  try {
    const dates = await getDates();
    if (!dates.length) {
      app.innerHTML = '<div class="empty">아직 추가한 리포트가 없어요.</div>';
      return;
    }

    const params = new URLSearchParams(location.hash.split('?')[1] || '');
    const mode = params.get('mode') || 'day';
    const selectedKey = params.get('date') || params.get('range') || null;

    // Group dates by mode
    const groups = groupDatesByRange(dates, mode);
    const groupKeys = Object.keys(groups).sort().reverse();
    const activeKey = selectedKey && groups[selectedKey] ? selectedKey : groupKeys[0];
    const activeDates = groups[activeKey] || [];

    // Load data for all dates in the active range
    const dr = activeDates.length === 1
      ? await getDailyResult(activeDates[0])
      : await getMultiDayResult(activeDates);
    const summary = computeSummary(dr);

    // For routing to report list, we encode the range
    const rangeParam = mode === 'day' ? `date=${activeKey}` : `range=${encodeURIComponent(activeKey)}&mode=${mode}`;
    const reportDates = activeDates.join(',');

    let html = `
      <div class="date-bar">
        <div class="mode-toggle">
          <button class="${mode==='day'?'active':''}" onclick="location.hash='#/?mode=day'">일별</button>
          <button class="${mode==='week'?'active':''}" onclick="location.hash='#/?mode=week'">주별</button>
          <button class="${mode==='month'?'active':''}" onclick="location.hash='#/?mode=month'">월별</button>
        </div>
        <select id="date-select">
          ${groupKeys.map(k => `<option value="${k}" ${k===activeKey?'selected':''}>${k}</option>`).join('')}
        </select>
      </div>

      <div class="stat-grid">
        <div class="stat-card"><div class="value">${summary.report_count}</div><div class="label">수집 리포트</div></div>
      </div>
    `;

    // Brokerage chips
    const brokerages = Object.entries(summary.brokerage_counts).sort((a,b) => b[1]-a[1]);
    if (brokerages.length) {
      html += `<h2>증권사별</h2><div class="chip-group">`;
      for (const [name, cnt] of brokerages) {
        html += `<span class="chip" onclick="location.hash='#/reports/${reportDates}?brokerage=${encodeURIComponent(name)}'">${esc(name)} <span class="count">${cnt}</span></span>`;
      }
      html += `</div>`;
    }

    // Ticker chips
    const tickers = Object.entries(summary.ticker_counts).sort((a,b) => b[1]-a[1]);
    const stockNames = summary.stock_names || {};
    if (tickers.length) {
      html += `<h2>종목별</h2><div class="chip-group">`;
      for (const [ticker, cnt] of tickers) {
        const name = stockNames[ticker] || ticker;
        html += `<span class="chip" onclick="location.hash='#/reports/${reportDates}?ticker=${encodeURIComponent(ticker)}'">${esc(name)} <span class="count">${cnt}</span></span>`;
      }
      html += `</div>`;
    }

    // Sector chips
    const sectors = Object.entries(summary.sector_counts).sort((a,b) => b[1]-a[1]);
    if (sectors.length) {
      html += `<h2>섹터별</h2><div class="chip-group">`;
      for (const [name, cnt] of sectors) {
        html += `<span class="chip" onclick="location.hash='#/reports/${reportDates}?sector=${encodeURIComponent(name)}'">${esc(name)} <span class="count">${cnt}</span></span>`;
      }
      html += `</div>`;
    }

    // Analyst chips
    const analysts = Object.entries(summary.analyst_counts).sort((a,b) => b[1]-a[1]);
    if (analysts.length) {
      html += `<h2>애널리스트별</h2><div class="chip-group">`;
      for (const [name, cnt] of analysts) {
        html += `<span class="chip" onclick="location.hash='#/reports/${reportDates}?analyst=${encodeURIComponent(name)}'">${esc(name)} <span class="count">${cnt}</span></span>`;
      }
      html += `</div>`;
    }

    app.innerHTML = html;

    $('#date-select').addEventListener('change', e => {
      const param = mode === 'day' ? 'date' : 'range';
      location.hash = `#/?mode=${mode}&${param}=${encodeURIComponent(e.target.value)}`;
    });
  } catch (err) {
    app.innerHTML = `<div class="empty">데이터를 불러오지 못했어요: ${esc(err.message)}</div>`;
  }
}

// --- Report List ---
async function renderReportList(hash) {
  app.innerHTML = '<div class="loading">로딩 중...</div>';
  try {
    const parts = hash.replace('#/reports/', '').split('?');
    const datesPart = parts[0];
    const params = new URLSearchParams(parts[1] || '');
    const brokerage = params.get('brokerage') || '';
    const ticker = params.get('ticker') || '';
    const sector = params.get('sector') || '';
    const analyst = params.get('analyst') || '';

    // Support comma-separated dates for multi-day ranges
    const dateList = datesPart.split(',').filter(Boolean);
    const dr = dateList.length === 1
      ? await getDailyResult(dateList[0])
      : await getMultiDayResult(dateList);
    const summary = computeSummary(dr);
    const reports = getFilteredReports(dr, {brokerage, ticker, sector, analyst});
    const stockNames = summary.stock_names || {};

    const dateLabel = dateList.length === 1 ? dateList[0] : `${dateList[0]} ~ ${dateList[dateList.length-1]}`;

    let filterTitle = '';
    if (brokerage) filterTitle = brokerage;
    else if (ticker) filterTitle = `${stockNames[ticker]||ticker} (${ticker})`;
    else if (sector) filterTitle = sector;
    else if (analyst) filterTitle = analyst;

    let html = `<a class="back" href="#/">&larr; 대시보드</a>`;
    html += `<h3>리포트 목록 &mdash; ${dateLabel}${filterTitle ? ' / '+esc(filterTitle) : ''}</h3>`;

    // Filter bar
    const brokerageOpts = Object.keys(summary.brokerage_counts).sort();
    const tickerOpts = Object.keys(summary.ticker_counts).sort();
    const sectorOpts = Object.keys(summary.sector_counts).sort();
    const analystOpts = Object.keys(summary.analyst_counts).sort();
    html += `<div class="filter-bar">
      <select id="f-brokerage">
        <option value="">전체 증권사</option>
        ${brokerageOpts.map(b => `<option value="${esc(b)}" ${b===brokerage?'selected':''}>${esc(b)}</option>`).join('')}
      </select>
      <select id="f-ticker">
        <option value="">전체 종목</option>
        ${tickerOpts.map(t => `<option value="${esc(t)}" ${t===ticker?'selected':''}>${esc(stockNames[t]||t)} (${esc(t)})</option>`).join('')}
      </select>
      <select id="f-sector">
        <option value="">전체 섹터</option>
        ${sectorOpts.map(s => `<option value="${esc(s)}" ${s===sector?'selected':''}>${esc(s)}</option>`).join('')}
      </select>
      <select id="f-analyst">
        <option value="">전체 애널리스트</option>
        ${analystOpts.map(a => `<option value="${esc(a)}" ${a===analyst?'selected':''}>${esc(a)}</option>`).join('')}
      </select>
      <button class="btn" onclick="location.hash='#/reports/${datesPart}'">초기화</button>
    </div>`;

    html += `<div class="count-label">${reports.length}건</div>`;

    for (const r of reports) {
      const sm = r.summary;
      const oneLine = sm ? esc(sm.generated.one_line) : '';
      const stockLabel = r.stock_name ? `${esc(r.stock_name)} (${esc(r.ticker)})` : (r.ticker || '');
      const detailDate = dateList.length === 1 ? dateList[0] : (r.published_date || dateList[0]);
      const sourceName = getSourceName(r.primary_url);
      const eyebrow = [r.brokerage, r.sector, r.market_type].filter(Boolean).map(esc).join(' · ');

      // Rating badge
      let ratingHtml = '';
      if (sm && sm.extracted.rating) {
        const rc = getRatingClass(sm.extracted.rating);
        const rl = getRatingLabel(sm.extracted.rating);
        ratingHtml = `<span class="rating ${rc}">${rl}</span>`;
      }

      // Target price
      let targetHtml = '';
      if (sm && sm.extracted.target_price != null) {
        targetHtml = `<span class="tag tag-mono">목표 ${fmtPrice(sm.extracted.target_price)}</span>`;
      }

      html += `
        <div class="report-card" onclick="location.hash='#/detail/${detailDate}/${r.canonical_id}'">
          ${eyebrow ? `<div class="eyebrow">${eyebrow}</div>` : ''}
          <div class="title">${esc(r.title)}</div>
          <div class="meta">
            ${stockLabel ? `<span class="tag">${stockLabel}</span>` : ''}
            ${ratingHtml}
            ${targetHtml}
            ${r.is_ai_generated ? `<span class="tag" style="background:var(--purple-100,#f3e8ff);color:var(--purple-700,#7c3aed);font-weight:600">AI</span>` : ''}
            ${sourceName ? `<span class="tag">${esc(sourceName)}</span>` : ''}
            ${r.pdf_url ? `<a href="${esc(r.pdf_url)}" target="_blank" class="tag" style="color:var(--accent-500);border-bottom:none" onclick="event.stopPropagation()">PDF</a>` : ''}
          </div>
          ${oneLine ? `<div class="one-line">${oneLine}</div>` : ''}
        </div>
      `;
    }

    if (!reports.length) {
      html += '<div class="empty">해당 조건의 리포트가 없어요.</div>';
    }

    app.innerHTML = html;

    const mkFilter = (id, key) => {
      $(id).addEventListener('change', e => {
        const v = e.target.value;
        location.hash = v ? `#/reports/${datesPart}?${key}=${encodeURIComponent(v)}` : `#/reports/${datesPart}`;
      });
    };
    mkFilter('#f-brokerage', 'brokerage');
    mkFilter('#f-ticker', 'ticker');
    mkFilter('#f-sector', 'sector');
    mkFilter('#f-analyst', 'analyst');
  } catch (err) {
    app.innerHTML = `<div class="empty">로드 실패: ${esc(err.message)}</div>`;
  }
}

// --- Report Detail ---
async function renderDetail(hash) {
  app.innerHTML = '<div class="loading">로딩 중...</div>';
  try {
    const m = hash.match(/#\/detail\/([^/]+)\/(.+)/);
    if (!m) { location.hash = '#/'; return; }
    const [, targetDate, cid] = m;

    const dr = await getDailyResult(targetDate);
    const data = getReportDetail(dr, cid);
    if (!data) { app.innerHTML = '<div class="empty">리포트를 찾을 수 없어요.</div>'; return; }
    const sm = data.summary;

    let html = `<a class="back" href="#/reports/${targetDate}">&larr; 목록으로</a>`;

    html += `<div class="detail-header">
      <div class="title">${esc(data.title)}</div>
      <div class="detail-meta">
        <span>증권사: ${esc(data.brokerage)}</span>
        <span>애널리스트: ${esc(data.analyst)}</span>
        ${data.is_ai_generated ? `<span class="tag" style="background:var(--purple-100,#f3e8ff);color:var(--purple-700,#7c3aed);font-weight:600">AI 생성 리포트</span>` : ''}
      </div>
      <div class="detail-meta">
        ${data.stock_name ? `<span>종목: ${esc(data.stock_name)} (${esc(data.ticker)})</span>` : ''}
        ${data.sector ? `<span>섹터: ${esc(data.sector)}</span>` : ''}
        ${data.market_type ? `<span class="tag">${esc(data.market_type)}</span>` : ''}
        <span>발행일: ${data.published_date}</span>
      </div>
      <div class="detail-meta">
        <span>원본: <a href="${esc(data.primary_url)}" target="_blank">${esc(data.primary_url)}</a></span>
        ${data.pdf_url ? `<span><a href="${esc(data.pdf_url)}" target="_blank" class="btn-accent" style="display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;border-bottom:none">PDF 다운로드</a></span>` : ''}
      </div>
      ${getSourceName(data.primary_url) ? `<div class="detail-meta"><span>출처: ${esc(getSourceName(data.primary_url))}</span></div>` : ''}
    </div>`;

    // Extracted info
    if (sm) {
      const ext = sm.extracted;
      const rc = getRatingClass(ext.rating);

      html += `<h2>추출 정보</h2>
        <div class="info-grid">
          <div class="info-box"><div class="label">목표주가</div><div class="value">${fmtPrice(ext.target_price)}</div></div>
          <div class="info-box"><div class="label">투자의견</div><div class="value"><span class="rating ${rc}">${getRatingLabel(ext.rating) || '-'}</span></div></div>
          <div class="info-box"><div class="label">실적</div><div class="value">${esc(ext.earnings) || '-'}</div></div>
        </div>`;

      // Generated summary
      const gen = sm.generated;
      html += `<h2>AI 요약</h2>
        <div class="summary-section">
          <div class="one-line">${esc(gen.one_line)}</div>
          ${gen.key_points && gen.key_points.length ? `<ul>${gen.key_points.map(p => `<li>${esc(p)}</li>`).join('')}</ul>` : ''}
          ${gen.opinion_summary ? `<p style="margin-top:12px;font-size:13px;color:var(--fg-secondary)"><strong style="color:var(--fg-primary)">의견:</strong> ${esc(gen.opinion_summary)}</p>` : ''}
        </div>`;
    }

    app.innerHTML = html;
  } catch (err) {
    app.innerHTML = `<div class="empty">로드 실패: ${esc(err.message)}</div>`;
  }
}
</script>
